<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Karim’s Portfolio</title>
  <meta name="description" content="Portfolio showcasing projects, skills, and contact information.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav role="navigation">
      <div class="hamburger">☰</div>
      <ul>
        <li><a href="#about-me">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section id="about-me">
    <h2>About Me</h2>
    <p>I’m a developer passionate about building accessible web apps...</p>
  </section>

  <section id="projects">
    <h2>Projects</h2>
    <article data-category="web">
      <figure>
        <img src="project1.png" alt="Screenshot of Project 1">
        <figcaption>Project 1 description</figcaption>
      </figure>
    </article>
    <article data-category="mobile">
      <figure>
        <img src="project2.png" alt="Screenshot of Project 2">
        <figcaption>Project 2 description</figcaption>
      </figure>
    </article>
  </section>

  <section id="skills">
    <h2>Skills</h2>
    <ul>
      <li>HTML5</li>
      <li>CSS3</li>
      <li>JavaScript</li>
    </ul>
  </section>

  <section id="contact">
    <h2>Contact Me</h2>
    <form>
      <label for="name">Name:</label>
      <input id="name" type="text" name="name" required>

      <label for="email">Email:</label>
      <input id="email" type="email" name="email" required>

      <label for="message">Message:</label>
      <textarea id="message" name="message"></textarea>

      <button type="submit">Send</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 Karim’s Portfolio</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
